<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Events Stats</title>
    <meta name="description" content="페이지 이벤트 일자별 통계">
    <meta name="theme-color" content="#667eea">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="app-header">
        <div class="container">
            <div class="header-content">
                <div class="header-left">
                    <h1 class="app-title">
                        <i class="bi bi-bar-chart-line-fill"></i>
                        <span>Page Events</span>
                    </h1>
                </div>
                <div class="header-actions">
                    <a href="index.html" class="btn-user-menu" title="돌아가기">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="app-main">
        <div class="container">
            <div class="quick-add-card">
                <div class="stats-filters">
                    <div class="form-group">
                        <label class="form-label">시작일</label>
                        <input type="date" class="form-input" id="startDate">
                    </div>
                    <div class="form-group">
                        <label class="form-label">종료일</label>
                        <input type="date" class="form-input" id="endDate">
                    </div>
                    <div class="form-group">
                        <label class="form-label">사이트</label>
                        <select class="form-input" id="siteFilter">
                            <option value="">전체</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">이벤트 타입</label>
                        <select class="form-input" id="eventTypeFilter">
                            <option value="">전체</option>
                        </select>
                    </div>
                    <button type="button" class="btn-add" id="applyFilterBtn">
                        <i class="bi bi-funnel"></i>
                        <span>조회</span>
                    </button>
                </div>
            </div>

            <div id="loadingSpinner" class="loading-spinner d-none">
                <div class="spinner"></div>
            </div>

            <div id="statsContent" class="d-none">
                <div class="stats-summary">
                    <div class="stats-card">
                        <div class="stats-card-label">총 이벤트</div>
                        <div class="stats-card-value" id="summaryTotal">0</div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-card-label">활동일</div>
                        <div class="stats-card-value" id="summaryDays">0</div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-card-label">일 평균</div>
                        <div class="stats-card-value" id="summaryAvg">0</div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-card-label">최대일</div>
                        <div class="stats-card-value" id="summaryMax">0</div>
                    </div>
                </div>

                <div class="stats-tabs" role="tablist">
                    <button type="button" class="stats-tab active" data-view="daily">
                        <i class="bi bi-calendar3"></i>
                        <span>일자 × 타입</span>
                    </button>
                    <button type="button" class="stats-tab" data-view="hourly">
                        <i class="bi bi-clock-history"></i>
                        <span>시간 히트맵</span>
                    </button>
                    <button type="button" class="stats-tab" data-view="bySite">
                        <i class="bi bi-globe"></i>
                        <span>사이트별</span>
                    </button>
                </div>

                <div class="stats-view" id="view-daily">
                    <div class="stats-section">
                        <h3 class="stats-section-title">
                            <i class="bi bi-bar-chart-fill"></i>
                            일자별 이벤트 수
                        </h3>
                        <div id="dailyChart" class="stats-chart"></div>
                    </div>

                    <div class="stats-section">
                        <h3 class="stats-section-title">
                            <i class="bi bi-table"></i>
                            상세 데이터
                        </h3>
                        <div class="stats-table-wrap">
                            <table class="stats-table" id="dailyTable">
                                <thead>
                                    <tr>
                                        <th>날짜</th>
                                        <th>총 이벤트</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="stats-view d-none" id="view-hourly">
                    <div class="stats-section">
                        <h3 class="stats-section-title">
                            <i class="bi bi-clock-history"></i>
                            시간대별 히트맵
                        </h3>
                        <div class="stats-heatmap-wrap">
                            <table class="stats-heatmap" id="hourlyHeatmap">
                                <thead></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="stats-heatmap-legend">
                            <span>적음</span>
                            <span class="legend-cell" data-level="0"></span>
                            <span class="legend-cell" data-level="1"></span>
                            <span class="legend-cell" data-level="2"></span>
                            <span class="legend-cell" data-level="3"></span>
                            <span class="legend-cell" data-level="4"></span>
                            <span>많음</span>
                        </div>
                    </div>
                </div>

                <div class="stats-view d-none" id="view-bySite">
                    <div class="stats-section">
                        <h3 class="stats-section-title">
                            <i class="bi bi-globe"></i>
                            사이트별 일자 매트릭스
                        </h3>
                        <div class="stats-table-wrap">
                            <table class="stats-table" id="siteTable">
                                <thead>
                                    <tr>
                                        <th>사이트</th>
                                        <th>합계</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="emptyState" class="empty-state d-none">
                <i class="bi bi-inbox"></i>
                <p>조회된 이벤트가 없습니다</p>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">
        <div class="toast-message" id="toastMessage"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="static/js/config.js"></script>
    <script type="module" src="static/js/stats.js"></script>
</body>

</html>
